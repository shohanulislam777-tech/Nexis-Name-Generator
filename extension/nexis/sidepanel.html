<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexis AI Tool</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div class="nx-header">
    <div class="nx-brand">
      <div class="nx-brand-icon">N</div>
      <span class="nx-brand-text">Nexis</span>
      <span class="nx-badge">v1.0</span>
    </div>
    <div class="nx-header-actions">
      <button class="nx-icon-btn nx-notif-btn" id="nx-notif-btn" title="Notifications">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        <span class="nx-notif-badge" id="nx-notif-badge" style="display:none">0</span>
      </button>
      <button class="nx-icon-btn nx-theme-btn" id="nx-theme-btn" title="Toggle Theme">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
      <button class="nx-icon-btn nx-logout-btn" id="nx-logout-btn" title="Sign Out">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="nx-body" id="sp-body">
    <div class="sp-license-gate" id="sp-loading" style="padding:40px 0;text-align:center">
      <p style="color:var(--nx-text-muted)">Loading...</p>
    </div>
  </div>

  <div class="nx-footer">
    <button class="nx-back-btn" id="sp-back-to-popup" title="Back to floating mode">
      ◀ Popup
    </button>
    <a href="https://nexis.dev/support" target="_blank" rel="noopener" class="nx-support-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12">
        <path d="M3 18v-6a9 9 0 0 1 18 0v6"/>
        <path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3z"/>
        <path d="M3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/>
      </svg>
      Support
    </a>
    <span class="nx-footer-badge">Nexis v1.0</span>
  </div>

  <div class="nx-notif-panel" id="nx-notif-panel" style="display:none">
    <div class="nx-notif-header">
      <span>Notifications</span>
      <div style="display:flex;gap:6px;align-items:center;">
        <button id="nx-notif-markread" title="Mark all as read" style="background:none;border:none;cursor:pointer;font-size:11px;color:var(--nx-text-muted);padding:2px 6px;border-radius:4px;">✓ Read</button>
        <button id="nx-notif-close" class="nx-notif-close">✕</button>
      </div>
    </div>
    <div class="nx-notif-list" id="nx-notif-list">
      <p class="nx-notif-empty">Loading...</p>
    </div>
  </div>

  <script src="lib/jszip.min.js"></script>
  <script src="lib/hwFingerprint.js"></script>
  <script src="lib/i18n.js"></script>
  <script src="lib/sounds.js"></script>
  <script src="sidepanel-templates.js"></script>
  <script src="sidepanel.js"></script>
  <script src="license.js"></script>
</body>
</html>
